<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <link rel="stylesheet" href="style.css" />
    <title>Weeknight</title>
  </head>
  <body>
    <header>
      <p>Free shipping over 499,-</p>
      <p>30 day return policy</p>
      <p>Shipping 1-3 business days</p>
    </header>
    <nav>
      <ul class="menu">
        <li><a href="productlist.html">Categories</a></li>
        <li><a href="productlist.html">Brands</a></li>
        <li><a href="productlist.html">All Products</a></li>
      </ul>
      <div class="logo">
        <a href="index.html"
          ><img src="img/weeknight-logo-1.png" alt="Weeknight logo"
        /></a>
      </div>
      <div class="cart">
        <a href="#"><img src="img/shopping-bag.svg" alt="Shop Cart" /></a>
      </div>
      <div class="burger-containers">
        <button class="burger" aria-label="Navigation Menu">
          <span class="linje"></span>
          <span class="linje"></span>
          <span class="linje"></span>
        </button>
      </div>
    </nav>
    <main>
      <section class="section-product">
        <div class="img-container">
          <img
            src="https://kea-alt-del.dk/t7/images/webp/640/1164.webp"
            alt="Product Image"
          />
          <img
            src="https://kea-alt-del.dk/t7/images/webp/640/1164.webp"
            alt="Product Image"
          />
          <img
            src="https://kea-alt-del.dk/t7/images/webp/640/1164.webp"
            alt="Product Image"
          />
          <img
            src="https://kea-alt-del.dk/t7/images/webp/640/1164.webp"
            alt="Product Image"
          />
        </div>
        <div class="product-info">
          <p class="brandname">Brand Name</p>
          <h3 class="productname">Product Name</h3>
          <div class="price-container">
            <p class="price">999,-</p>
            <span class="salesprice">799,-</span>
          </div>
          <p class="stock">
            <span class="in-stock">In stock</span
            ><span class="out-of-stock">Out of stock</span>
          </p>
          <a href=""> <button class="add-to-cart">Add to Cart</button></a>
        </div>
      </section>
    </main>
    <script src="menu.js"></script>
    <script src="product.js"></script>
  </body>
</html>
